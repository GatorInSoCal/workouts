<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111318">
<title>Weekly Gym Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111318; --bg2: #1a1d24; --bg3: #20242e; --bg-card: #1e2029;
    --bg-cardio: #2a1e18; --bg-lift: #18202e; --bg-home: #23200e;
    --orange: #f07a20; --orange-dim: rgba(240,122,32,0.15);
    --blue: #4a8fd4; --text: #f0ede8; --text2: #a09890; --text3: #6a6560;
    --border: rgba(255,255,255,0.07); --radius: 14px; --radius-sm: 8px;
  }
  html { background: var(--bg); }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }
  .header { text-align: center; padding: 36px 20px 24px; border-bottom: 1px solid var(--border); }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(28px,7vw,42px); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
  .header-title span { color: var(--orange); margin-right: 10px; font-size: 0.85em; }
  .header-sub { margin-top: 6px; font-size: 13px; color: var(--text2); }
  .header-sub b { color: var(--text); font-weight: 500; }
  .week-badge { display: inline-block; margin-top: 10px; background: var(--orange-dim); color: var(--orange); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; }
  .day-tabs { display: flex; justify-content: center; gap: 10px; padding: 24px 16px 0; flex-wrap: wrap; }
  .day-tab { position: relative; padding: 10px 20px; border-radius: 40px; border: none; background: var(--bg3); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; min-width: 64px; }
  .day-tab:hover { background: var(--bg-card); color: var(--text); }
  .day-tab.active { background: var(--orange); color: #fff; }
  .today-badge { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--orange); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; white-space: nowrap; }
  .day-tab.active .today-badge { background: rgba(255,255,255,0.35); }
  .day-section { padding: 28px 16px 0; max-width: 900px; margin: 0 auto; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .day-heading { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(24px,6vw,36px); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .day-type { color: var(--orange); }
  .day-tag { display: inline-block; background: var(--orange-dim); color: var(--orange); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 6px; margin-bottom: 22px; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .split { grid-template-columns: 1fr; } }
  .card { border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
  .card-cardio { background: var(--bg-cardio); }
  .card-lift { background: var(--bg-lift); }
  .card-header { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-cardio .card-header { color: #e05c5c; }
  .card-lift .card-header { color: var(--blue); }
  .cardio-activity { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .cardio-steps { display: flex; flex-direction: column; gap: 12px; }
  .cardio-step { display: flex; gap: 10px; align-items: flex-start; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 5px; }
  .step-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .step-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .target-hr { margin-top: 14px; background: rgba(240,122,32,0.08); border: 1px solid rgba(240,122,32,0.2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-weight: 600; color: var(--orange); display: flex; align-items: center; gap: 8px; }
  .exercises { display: flex; flex-direction: column; gap: 14px; }
  .exercise { display: flex; align-items: flex-start; gap: 12px; }
  .ex-num { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--blue); min-width: 22px; line-height: 1; padding-top: 1px; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .ex-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ex-sets { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--blue); white-space: nowrap; }
  .home-card { margin-top: 16px; background: var(--bg-home); border: 1px solid rgba(240,180,20,0.15); border-radius: var(--radius); padding: 18px; display: flex; gap: 14px; align-items: flex-start; }
  .home-icon { font-size: 24px; flex-shrink: 0; line-height: 1.2; }
  .home-title { font-size: 14px; font-weight: 700; color: var(--orange); margin-bottom: 5px; }
  .home-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .home-body b { color: var(--text); font-weight: 600; }
  .tips { display: flex; justify-content: center; gap: 28px; flex-wrap: wrap; padding: 30px 20px 8px; border-top: 1px solid var(--border); margin-top: 30px; max-width: 900px; margin-left: auto; margin-right: auto; }
  .tip { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 7px; }
  .made-by { text-align: center; font-size: 12px; color: var(--text3); margin-top: 14px; }
</style>

<script>
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function getWeekSeed() {
  const now = new Date();
  // Roll back to the most recent Monday
  const day = now.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const diff = (day === 0) ? 6 : day - 1; // days since Monday
  const monday = new Date(now);
  monday.setHours(0, 0, 0, 0);
  monday.setDate(now.getDate() - diff);
  // Seed = YYYYMMDD of that Monday — guaranteed to change each Monday
  return monday.getFullYear() * 10000 + (monday.getMonth() + 1) * 100 + monday.getDate();
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

      [{n:'Leg Curl Machine',d:'Lying or seated · hamstring isolation',s:'3×15'},{n:'Nordic Hamstring Curl',d:'Decline bench secured · eccentric hamstring',s:'3×8'},{n:'Swiss Ball Hamstring Curl',d:'Stability ball · bodyweight hamstring curl',s:'3×12'}],
      [{n:'Calf Raise (Smith Machine)',d:'Smith machine or standing calf raise machine',s:'4×20'},{n:'Seated Calf Raise Machine',d:'Machine · soleus focus · slow reps',s:'4×20'},{n:'Leg Press Calf Press',d:'Leg press machine · toes on edge · calf raise',s:'4×20'}],
    ],
    home: [
      'Try 30 minutes of <b>bodyweight leg circuits</b> — squats, jump squats, reverse lunges, glute bridges, and wall sits. 4 rounds of 15–20 reps per move with 30 sec rest between rounds.',

  },
  THU: {
    cardio: [

      { title: 'Treadmill Jog', steps: [{t:'5 min walk warm-up',s:'3.5 mph, easy pace'},{t:'20 min steady jog',s:'5.0–6.5 mph · conversational pace'},{t:'5 min walk cool-down',s:'3.0 mph, deep breathing'}], hr:'Target HR: 60–75% max'},

    ],

      [{n:'Seated Dumbbell Shoulder Press',d:'Dumbbells · full overhead press · all 3 heads',s:'3×12'},{n:'Barbell Overhead Press',d:'Standing or seated · barbell · shoulder compound',s:'3×10'},{n:'Smith Machine Shoulder Press',d:'Smith machine · overhead press · controlled',s:'3×12'}],
      [{n:'Lateral Raise',d:'Dumbbells · medial delt isolation · slow reps',s:'3×15'},{n:'Cable Lateral Raise',d:'Cable machine · constant tension · single arm',s:'3×15'},{n:'Machine Lateral Raise',d:'Lateral raise machine · isolation · squeeze at top',s:'3×15'}],

const dayNames = {MON:'Monday',TUE:'Tuesday',WED:'Wednesday',THU:'Thursday',FRI:'Friday'};
const dayTypes = {MON:'Push Day',TUE:'Pull Day',WED:'Leg Day',THU:'Shoulders & Core',FRI:'Full Body'};
const dayTags  = {MON:'Chest & Triceps',TUE:'Back & Biceps',WED:'Quads, Hamstrings & Glutes',THU:'Delts, Traps & Abs',FRI:'Compound Strength Day'};
const days = ['MON','TUE','WED','THU','FRI'];

const seed = getWeekSeed();
const rng = seededRand(seed);
const weekPlan = {};
days.forEach(day => {
  const pool = pools[day];
  weekPlan[day] = {
    cardio: pick(pool.cardio, rng),
    exercises: pool.slots.map(slot => pick(slot, rng)),
    home: pick(pool.home, rng)
  };
});

function getTodayKey() {
  return {1:'MON',2:'TUE',3:'WED',4:'THU',5:'FRI'}[new Date().getDay()] || null;
}
function getWeekLabel() {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0) ? 6 : day - 1;
  const monday = new Date(now);
  monday.setHours(0, 0, 0, 0);
  monday.setDate(now.getDate() - diff);
  const mo = monday.toLocaleString('default', { month: 'short' });
  const d = monday.getDate();
  return `Week of ${mo} ${d} · Refreshes every Monday`;
}

let active = getTodayKey() || 'MON';

function renderTabs() {
  const today = getTodayKey();
  document.getElementById('tabs').innerHTML = days.map(d =>
    `<button class="day-tab${d===active?' active':''}" onclick="setDay('${d}')">
      ${d===today?'<span class="today-badge">Today</span>':''}${d}
    </button>`).join('');
}

function renderContent() {
  const p = weekPlan[active];
  document.getElementById('content').innerHTML = `
    <div class="day-section">
      <div style="padding:0 16px;max-width:900px;margin:0 auto;">
        <div class="day-heading"><span>${dayNames[active]} — </span><span class="day-type">${dayTypes[active]}</span></div>
        <div class="day-tag">${dayTags[active]}</div>
        <div class="split">
          <div class="card card-cardio">
            <div class="card-header">❤️ Cardio — 30 Min</div>
            <div class="cardio-activity">${p.cardio.title}</div>
            <div class="cardio-steps">${p.cardio.steps.map(s=>`
              <div class="cardio-step"><div class="dot"></div>
              <div><div class="step-title">${s.t}</div><div class="step-sub">${s.s}</div></div></div>`).join('')}
            </div>
            <div class="target-hr">🫀 ${p.cardio.hr}</div>
          </div>
          <div class="card card-lift">
            <div class="card-header">🏆 Lifting — 30 Min</div>
            <div class="exercises">${p.exercises.map((e,i)=>`
              <div class="exercise">
                <div class="ex-num">${i+1}</div>
                <div class="ex-info"><div class="ex-name">${e.n}</div><div class="ex-detail">${e.d}</div></div>
                <div class="ex-sets">${e.s}</div>
              </div>`).join('')}
            </div>
          </div>
        </div>
        <div class="home-card">
          <div class="home-icon">🏠</div>
          <div>
            <div class="home-title">Can't make it to the gym today?</div>
            <div class="home-body">${p.home}</div>
          </div>
        </div>
      </div>
      <div class="tips">
        <div class="tip"><span>🔥</span> Always warm up before lifting</div>
        <div class="tip"><span>⏱️</span> Rest 60–90 sec between sets</div>
        <div class="tip"><span>💧</span> Stay hydrated!</div>
      </div>
      <div class="made-by">Made with 💪 for the gym</div>
    </div>`;
}

function setDay(d) { active = d; renderTabs(); renderContent(); }

document.getElementById('week-label').textContent = getWeekLabel();
renderTabs();
renderContent();
</script>
</body>
</html>
